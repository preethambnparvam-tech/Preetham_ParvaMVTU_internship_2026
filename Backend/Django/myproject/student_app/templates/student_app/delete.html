{% extends "student_app/base.html" %}

{% block content %}
<h1 class="text-danger bg-warning text-center p-3">Delete Student Details</h1>
<div class="card">
    <div class="card-body">
        <h1 class="text-danger">Do you really want to delete the student details?{{ student.name }}</h1>
        <form method="post">
            {% csrf_token %}
            <button class="btn btn-danger" type="submit">Delete</button>
            <a href="{% url 'student_list' %}" class="btn btn-success">Cancel</a>
        </form>
    </div>
</div>

{% endblock %}
