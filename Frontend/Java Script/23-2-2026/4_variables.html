<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <h1>Variables in JavaScript</h1>
    <p>4 ways to create a variables</p>
    <h3>1.Automatically</h3>
    <h3>2.Var keyword</h3>
    <h3>3.let keyword</h3>
    <h3>4.const keyword</h3>

    <script>
        //Automatically
        first_name = "Preetham";
        console.log("The first name is: ",first_name);

        //var
        var last_name = "B N";
        console.log("Last name: ",last_name);

        //let
        let age = 22;
        console.log("Age: ", age);

        //const
        const pi = 3.14;
        console.log("Pi: ",pi);

    </script>
    <script>
        // re declaring variables
        var gender = "M";
        console.log("Gender: ",gender);
        var gender = "F";
        console.log("Gender: ",gender);

        let mark = 50;
        console.log("Mark: ",mark);

        mark = 90;
        console.log("Mark: ",mark);

        const country = "India";
        console.log("Country: ",country);

        {
            var City = "Bengalore";
            console.log("City: ",City);
        }
        // console.log("City: ",City);
        {
            let state = "Karnataka";
            console.log("State: ",state);
        }
    </script>
</body>
</html>
