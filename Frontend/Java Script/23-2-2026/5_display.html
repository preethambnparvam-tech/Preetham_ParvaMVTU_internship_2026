<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display</title>
</head>
<body>
    <h1>Display in Javascript</h1>
    <h3>1.console.log()</h3>
    <h3>2.window.alert()</h3>
    <h3>3.document.write</h3>

    <button onclick="alertWindow()">Window alert</button>
    <button onclick="documentWrite()">Document write</button>

    <script>
        function alertWindow() {
            window.alert("User clicked the button");
        }

        function documentWrite() {
            document.write("User clicked the button");
        }
    </script>
</body>
</html>
