<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
      <style>
        input {
            padding: 8px;
            margin: 5px;
        }
        button {
            padding: 8px 15px;
            cursor: pointer;
        }
        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

<h1>Student Registration Form</h1>

<form id="studentForm">
    <input type="sino" id="sino" placeholder="Enter SI NO" required>
    <input type="text" id="name" placeholder="Enter Name" required>
    <input type="email" id="email" placeholder="Enter Email" required>
    <input type="usn" id="usn" placeholder="Enter USN" required>
    <input type="number" id="age" placeholder="Enter Age" required>
    <button type="submit">Submit</button>
</form>

<h1>Student Details</h1>
<table id="studentTable">
    <thead>
        <tr>
            <th>SI_NO</th>
            <th>Name</th>
            <th>Email</th>
            <th>USN</th>
            <th>Age</th>
        </tr>
    </thead>
    <tbody>
    </tbody>
</table>

<script>
    document.getElementById("studentForm").addEventListener("submit", function(event) {
        event.preventDefault();

        let sino = document.getElementById("sino").value;
        let name = document.getElementById("name").value;
        let email = document.getElementById("email").value;
        let usn = document.getElementById("usn").value;
        let age = document.getElementById("age").value;

      
        let table = document.getElementById("studentTable").getElementsByTagName("tbody")[0];
        let newRow = table.insertRow();

        let cell1 = newRow.insertCell(0);
        let cell2 = newRow.insertCell(1);
        let cell3 = newRow.insertCell(2);
        let cell4 = newRow.insertCell(3);
        let cell5 = newRow.insertCell(4);

        cell1.innerHTML = sino;
        cell2.innerHTML = name;
        cell3.innerHTML = email;
        cell4.innerHTML = usn;
        cell5.innerHTML = age;

        
        document.getElementById("studentForm").reset();
    });
</script>

</body>
</html>
