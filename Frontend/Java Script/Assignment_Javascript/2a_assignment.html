<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Chech Even or Odd</h1><br><br>
    <h1>Chech multiple of 5 or NOT</h1>
</body>

<script>
    let num = +prompt("Enter a number to check Even or Odd:");

    if (num % 2 === 0) {
        console.log(num + " is Even");
    } else {
        console.log(num + " is Odd");
    }

    let num2 = +prompt("Enter a number to check multiple of 5:");

    if (num2 % 5 === 0) {
        console.log(num2 + " is a multiple of 5");
    } else {
        console.log(num2 + " is NOT a multiple of 5");
    }

</script>

</html>
