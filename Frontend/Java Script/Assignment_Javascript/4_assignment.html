<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        h1 {
            margin-top: 20px;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 70%;
            background: white;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background-color: #007bff;
            color: white;
        }

        button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Student Result Management System</h1>

    <table id="resultTable">
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Total</th>
                <th>Average</th>
                <th>Grade</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <button onclick="showTopStudents()">Show Average Above 75</button>

    <script>
        const students = [
            { id: 1, name: "Rahul", marks: [80, 75, 90] },
            { id: 2, name: "Sneha", marks: [60, 70, 65] },
            { id: 3, name: "Arjun", marks: [95, 92, 88] }
        ];


        function calculateTotal(marks) {
            return marks.reduce((total, mark) => total + mark, 0);
        }


        const calculateGrade = (total, count) => {
            const average = total / count;

            let grade;
            if (average >= 90) grade = "A";
            else if (average >= 75) grade = "B";
            else if (average >= 60) grade = "C";
            else grade = "Fail";

            return { average, grade };
        };


        const studentResults = students.map(student => {
            const total = calculateTotal(student.marks);
            const result = calculateGrade(total, student.marks.length);

            return {
                id: student.id,
                name: student.name,
                total: total,
                average: result.average.toFixed(2),
                grade: result.grade
            };
        });

        console.log("Mapped Student Results:", studentResults);


        const topStudents = studentResults.filter(student => student.average > 75);
        console.log("Students with Average > 75:", topStudents);


        studentResults.forEach(student => {
            console.log(`ID : ${student.id}, Name: ${student.name}, Total: ${student.total}, Average: ${student.average}, Grade: ${student.grade}`
            );
        });


        const tableBody = document.querySelector("#resultTable tbody");

        function displayStudents(data) {
            tableBody.innerText = "";

            data.forEach(student => {
                const row = `
      <tr>
        <td>${student.id}</td>
        <td>${student.name}</td>
        <td>${student.total}</td>
        <td>${student.average}</td>
        <td>${student.grade}</td>
      </tr>
    `;
                tableBody.innerHTML += row;
            });
        }

        displayStudents(studentResults);


        function showTopStudents() {
            displayStudents(topStudents);
        }


        function scopeTest() {

            var a = 10;
            let b = 20;
            const c = 30;

            if (true) {
                var a = 100;
                let b = 200;
                const c = 300;
                console.log("Inside block: ", a, b, c);
            }
            console.log("Outside block:", a, b, c);
        }

        scopeTest();


        let num1 = 10;
        let num2 = num1;

        num2 = 20;

        console.log("Primitive:");
        console.log("num1:", num1);
        console.log("num2:", num2);


        let arr1 = [1, 2, 3];
        let arr2 = arr1;

        arr2.push(4);

        console.log("Reference:");
        console.log("arr1:", arr1);
        console.log("arr2:", arr2);

    </script>
</body>
</html>
