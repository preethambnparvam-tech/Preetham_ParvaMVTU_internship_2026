<!DOCTYPE html>
<html>

<head>
    <title>Student Registration Form</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="../../Bootstrap/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f5f5;
        }
    </style>

</head>

<body>

    <div class="container mt-5">

        <h2 class="text-center mb-4">Student Registration Form</h2>

        <form id="studentForm" class="card p-4 shadow">

            <div class="mb-3">
                <label>Name</label>
                <input type="text" class="form-control" id="name">
            </div>

            <div class="mb-3">
                <label>Email</label>
                <input type="text" class="form-control" id="email">
            </div>

            <div class="mb-3">
                <label>Phone</label>
                <input type="text" class="form-control" id="phone">
            </div>

            <div class="mb-3">
                <label>Course</label>
                <select class="form-select" id="course">
                    <option value="">Select Course</option>
                    <option>B.E</option>
                    <option>BCA</option>
                    <option>B.Sc</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Gender</label><br>
                <input type="radio" name="gender" value="Male"> Male
                <input type="radio" name="gender" value="Female"> Female
            </div>

            <div class="mb-3">
                <label>Skills</label><br>
                <input type="checkbox" class="skill" value="HTML"> HTML
                <input type="checkbox" class="skill" value="CSS"> CSS
                <input type="checkbox" class="skill" value="JavaScript"> JavaScript
            </div>

            <div class="mb-3">
                <label>Address</label>
                <textarea class="form-control" id="address"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">Submit</button>

        </form>

        <div id="result" class="mt-4"></div>

    </div>

    <script>

        document.getElementById("studentForm").addEventListener("submit", function (e) {

            e.preventDefault()

            let name = document.getElementById("name").value
            let email = document.getElementById("email").value
            let phone = document.getElementById("phone").value
            let course = document.getElementById("course").value
            let address = document.getElementById("address").value

            let gender = document.querySelector('input[name="gender"]:checked')

            let skills = []
            document.querySelectorAll(".skill:checked").forEach(s => {
                skills.push(s.value)
            })

            if (name == "") {
                alert("Name cannot be empty")
                return
            }

            if (!email.includes("@")) {
                alert("Email must contain @")
                return
            }

            if (phone.length != 10) {
                alert("Phone must be 10 digits")
                return
            }

            let genderValue = gender ? gender.value : ""

            document.getElementById("result").innerHTML =

                `
<div class="card p-3 shadow">
<h4>Student Details</h4>
<p><b>Name:</b> ${name}</p>
<p><b>Email:</b> ${email}</p>
<p><b>Phone:</b> ${phone}</p>
<p><b>Course:</b> ${course}</p>
<p><b>Gender:</b> ${genderValue}</p>
<p><b>Skills:</b> ${skills.join(", ")}</p>
<p><b>Address:</b> ${address}</p>
</div>
`

        })

    </script>

</body>

</html>
