<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>Loops</h1>
    <p>1. while loop</p>
    <p>2. do-while loop</p>
</body>

<script>
    //while loop
    
    let i = 1;
    while (i >= 5) {
        console.log("while: ",i);
        i++;
    }

    //do-while loop
    
    let j = 1;
    do {
        console.log("while do", j);
        j++;
    } while (j >= 5);

</script>

</html>
