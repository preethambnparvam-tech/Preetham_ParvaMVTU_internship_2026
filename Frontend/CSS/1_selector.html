<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector</title>
    <style>
        *{
            font-family: 'Courier New', Courier, monospace;
        }

        .div_tag{
            color: red;
        }

        #para1{
            background-color: violet;
        }

        p{
            color: green;
        }
        
    </style>
</head>
<body>
    <h1>Selectors in CSS</h1>
    <p>1.class - .</p>
    <p>2.id - #</p>
    <p>3.Element - tag name</p>
    <p>universal - *</p>

    <div class="div_tag">Lorem, ipsum.</div>
    <div class="div_tag">Lorem ipsum dolor sit.</div>

    <p id="para1">para1</p>
    <p id="para2">para2</p>
    <p id="para3">para3</p>
</body>
</html>
