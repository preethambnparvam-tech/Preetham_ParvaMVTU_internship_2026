<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        span{
            display:block;
            width: 100px;
            height: 100px;
            background-color: aqua;
        }
        div{
            display:inline;
            background-color: yellow;
            width: 100px;
            height: 300px;
        }
    </style>
</head>
<body>
    <h3>html elements type</h3>
    <p>1.Block elements</p>
    <p>1.Inline elements</p>

    <p>display:</p>
    <pre>
        selector{
            display:value;
        }
    </pre>
    <h3>display:Block</h3>
    <span>Hello</span>
    <span>World</span>

    <h3>display:Inline</h3>
    <div>this is block</div>
    <div>level elements</div>
</body>
</html>
