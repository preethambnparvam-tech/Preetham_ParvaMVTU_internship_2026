<!doctype html>
<html lang="en">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
</head>

<body>
    <form class="mb-3 container">
        <div class="mb-3">
            <label class="form-label" for="name">Name</label>
            <input class="form-control" type="text" name="name" id="name">
        </div>
        <div class="form-floating mb-3">
            <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
            <label for="floatingInput">Email address</label>
        </div>
        <div class="form-floating">
            <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
            <label for="floatingPassword">Password</label>
        </div>
        <!-- <div class="mb-3">
                <label class="form-label" for="email">Email ID</label>
                <input class="form-control" type="email" name="email" id="email">
            </div> -->
        <div class="mb-3">
            <label class="form-label" for="phone">Phone Number</label>
            <input class="form-control" type="tel" name="phone" id="phone">
        </div>
        <!-- <div class="mb-3">
                <label class="form-label" for="password">password</label>
                <input class="form-control" type="password" name="password" id="password">
            </div> -->
        <div class="mb-3">
            <label class="form-label" for="address">Address</label>
            <input class="form-control" rows="5" name="Address" id="address"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label" for="dob">Date of Birth:</label>
            <input class="form-control" type="date" name="dob" id="dob">
        </div>


        <div class="mb-3">
            <label class="form-label" for="known-language">Language Knowns</label>
            <div class="form-check">
                <input class="form-check-input" type="checkbox" value="" id="Kannada">
                <label class="form-check-label" for="checkDefault">Kannada</label>

                 <div class="d-flex">
                <div class="mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="telugu">
                        <label class="form-check-label" for="telugu">Telugu</label>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="" id="Hindi">
                            <label class="form-check-label" for="checkDefault">Hindi</label>

                            <div class="mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="tamil">
                                    <label class="form-check-label" for="tamil">Tamil</label>
                                </div>
                            </div>
                        </div>
                        </div>

                        <div class="mb-3">
                            <label for="gender">Gender:</label>
                            <input type="radio" name="gender" id="male" value="male">
                            <label for="male">Male</label>
                            <input type="radio" name="gender" id="female" value="female">
                            <label for="female">Female</label>
                        </div>

                        <div>
                            <input class="btn btn-danger" type="reset" value="Clear Form">
                            <input class="btn btn-success" type="submit" value="Submit Form">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="course">Course</label>
                        <select class="form-select">
                            <option>Select the course</option>
                            <option value="JFSWD" selected>Java Full Stact Web Development</option>
                            <option value="PFSWD">Python Full Stact Web Development</option>
                            <option value="ML">Machine Language</option>

                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label"></label>
                    </div>

                    <label for="rating" class="form-label">Give Rating</label>
                    <input type="range" class="form-range" min="1" max="5" id="range1">

    </form>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
</body>

</html>
